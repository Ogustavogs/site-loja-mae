<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feminina Bijuteria | Semijoias de Luxo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        #sidebar { transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); }
        .overlay { transition: opacity 0.4s ease; pointer-events: none; opacity: 0; }
        .overlay.active { pointer-events: auto; opacity: 1; }
    </style>
</head>
<body class="bg-[#faf9f6] text-[#2c2c2c] overflow-x-hidden">

    <div id="overlay" class="overlay fixed inset-0 bg-black/40 backdrop-blur-sm z-[60]" onclick="toggleSidebar()"></div>
    
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white z-[70] shadow-2xl -translate-x-full p-8 flex flex-col justify-between border-r border-[#ffedfa]">
        <div>
            <div class="flex justify-between items-center mb-12">
                <h2 class="serif text-xl tracking-widest uppercase text-[#e03a9f]">Menu</h2>
                <button onclick="toggleSidebar()" class="text-stone-400 p-2">✕</button>
            </div>
            <nav class="space-y-6">
                <a href="#" class="block text-lg hover:text-[#e03a9f] transition-all">Colares</a>
                <a href="#" class="block text-lg hover:text-[#e03a9f] transition-all">Brincos</a>
                <a href="#" class="block text-lg hover:text-[#e03a9f] transition-all">Anéis</a>
                <a href="https://instagram.com/femininabijuteria" target="_blank" class="block text-lg text-[#e1306c] font-bold">Instagram</a>
            </nav>
        </div>
    </aside>

    <nav class="p-4 md:p-6 flex justify-between items-center bg-white/95 backdrop-blur-md sticky top-0 z-50 border-b border-stone-100 shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2">
                <span class="block w-6 h-[1px] bg-black mb-1.5"></span>
                <span class="block w-4 h-[1px] bg-black"></span>
            </button>
            <img src="https://i.postimg.cc/ZKgDBT7F/Whats-App-Image-2026-04-20-at-14-12-55.jpg" alt="Logo" class="h-10 md:h-12 w-auto">
        </div>
        <a href="https://wa.me/5521989626714?text=Olá!%20Vim%20pelo%20site." target="_blank" class="bg-black text-white px-5 py-2.5 text-[10px] tracking-widest uppercase rounded-full font-bold">WhatsApp</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-20 text-center">
        <h2 class="serif text-4xl md:text-7xl mb-6">Onde a sua beleza <br> <span class="italic text-[#e03a9f]">encontra</span> o brilho.</h2>
        <p class="text-stone-500 mb-10 max-w-lg mx-auto">Semijoias exclusivas com curadoria de Dona Maria.</p>
        <a href="https://instagram.com/femininabijuteria" target="_blank" class="text-sm font-bold border-b-2 border-black pb-1 hover:text-[#e03a9f] hover:border-[#e03a9f] transition-all">@femininabijuteria</a>
    </main>

    <div class="fixed bottom-6 right-6 z-[100] flex flex-col items-end gap-4">
        <div id="chat-window" class="w-[320px] md:w-96 h-[450px] bg-white rounded-3xl shadow-2xl border border-[#ffedfa] flex flex-col opacity-0 scale-0 origin-bottom-right pointer-events-none transition-all">
            <div class="p-4 bg-[#ffedfa]/50 flex justify-between items-center border-b border-[#ffedfa]">
                <span class="serif font-bold text-[#e03a9f]">Consultora Luna</span>
                <button onclick="toggleChat()">✕</button>
            </div>
            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm">
                <p class="bg-[#ffedfa] p-3 rounded-2xl self-start">Olá! Sou a Luna. Qual peça você está procurando hoje?</p>
            </div>
            <div class="p-4 flex gap-2">
                <input type="text" id="user-input" placeholder="Pergunte à Luna..." class="flex-1 bg-stone-50 p-2 rounded-full outline-none text-sm">
                <button onclick="sendMessage()" class="bg-black text-white px-4 py-2 rounded-full text-xs">OK</button>
            </div>
        </div>
        <button onclick="toggleChat()" class="w-16 h-16 bg-[#e03a9f] rounded-full shadow-2xl flex items-center justify-center text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 1.66-4 3-9 3s-9-1.34-9-3 4-3 9-3 9 1.34 9 3z"></path></svg>
        </button>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('active');
        }
        function toggleChat() {
            const chat = document.getElementById('chat-window');
            chat.classList.toggle('opacity-0');
            chat.classList.toggle('scale-0');
            chat.classList.toggle('pointer-events-none');
        }
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('chat-messages');
            const text = input.value.trim();
            if (text === "") return;

            messages.innerHTML += `<p class="bg-stone-100 p-3 rounded-2xl self-end text-right">${text}</p>`;
            input.value = "";
            messages.scrollTop = messages.scrollHeight;

            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await response.json();
            messages.innerHTML += `<p class="bg-[#ffedfa] p-3 rounded-2xl self-start">${data.response}</p>`;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
