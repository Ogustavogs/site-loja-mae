<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feminina - Seleção Valéria</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* CORES DA MARCA - Edite aqui para mudar o site todo */
            --cor-primaria: #D4AF37; /* Dourado da marca */
            --cor-fundo: #050505;    /* Preto luxo */
            --cor-card: #121212;     /* Fundo dos produtos */
            --cor-texto: #ffffff;
            --font-titulo: 'Playfair Display', serif;
            --font-corpo: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            font-family: var(--font-corpo);
            margin: 0;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        header h1 {
            font-family: var(--font-titulo);
            font-size: 3rem;
            color: var(--cor-primaria);
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        header p {
            letter-spacing: 3px;
            font-weight: 300;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* VITRINE */
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 60px 10%;
        }

        .produto-card {
            background: var(--cor-card);
            border: 1px solid #222;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
        }

        .produto-card:hover {
            transform: translateY(-10px);
            border-color: var(--cor-primaria);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }

        .produto-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .produto-card h3 {
            font-family: var(--font-titulo);
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .produto-card .preco {
            color: var(--cor-primaria);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .btn-add {
            background: transparent;
            color: var(--cor-primaria);
            border: 1px solid var(--cor-primaria);
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-add:hover {
            background: var(--cor-primaria);
            color: #000;
        }

        /* CARRINHO LATERAL */
        #carrinho-lateral {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100vh;
            background: #0f0f0f;
            border-left: 1px solid var(--cor-primaria);
            padding: 40px 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
        }

        #carrinho-lateral.ativo {
            right: 0;
        }

        .fechar-carrinho {
            background: none;
            border: none;
            color: var(--cor-primaria);
            font-size: 1.5rem;
            cursor: pointer;
            float: right;
        }

        .item-carrinho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding: 15px 0;
        }

        .total-container {
            margin-top: 40px;
            font-size: 1.3rem;
            text-align: right;
            border-top: 1px solid var(--cor-primaria);
            padding-top: 20px;
        }

        .btn-whatsapp {
            background: #25d366;
            color: #fff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* LUNA (Botão de Suporte) */
        #luna-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--cor-primaria);
            color: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            z-index: 1500;
            font-size: 1.5rem;
        }

    </style>
</head>
<body>

    <header>
        <h1>Feminina</h1>
        <p>Curadoria por Valéria</p>
    </header>

    <section class="vitrine">
        <div class="produto-card">
            <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?auto=format&fit=crop&q=80&w=400" alt="Brinco">
            <h3>Brinco Argola Ouro</h3>
            <div class="preco">R$ 89,90</div>
            <button class="btn-add" onclick="adicionarAoCarrinho('Brinco Argola Ouro', 89.90)">Adicionar</button>
        </div>

        <div class="produto-card">
            <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?auto=format&fit=crop&q=80&w=400" alt="Colar">
            <h3>Colar Minimalista</h3>
            <div class="preco">R$ 129,90</div>
            <button class="btn-add" onclick="adicionarAoCarrinho('Colar Minimalista', 129.90)">Adicionar</button>
        </div>
    </section>

    <div id="carrinho-lateral">
        <button class="fechar-carrinho" onclick="toggleCarrinho()">&times;</button>
        <h2 style="font-family: var(--font-titulo); color: var(--cor-primaria);">Seu Pedido</h2>
        <div id="itens-carrinho"></div>
        <div class="total-container">
            Total: <strong>R$ <span id="valor-total">0.00</span></strong>
        </div>
        <button class="btn-whatsapp" onclick="enviarParaWhatsapp()">
            Finalizar no WhatsApp
        </button>
    </div>

    <div id="luna-btn" onclick="alert('Luna: Oi! Estou aqui para ajudar com suas dúvidas sobre as peças da Valéria.')">
        ✨
    </div>

    <script>
        let carrinho = [];

        function toggleCarrinho() {
            document.getElementById('carrinho-lateral').classList.toggle('ativo');
        }

        function adicionarAoCarrinho(nome, preco) {
            carrinho.push({ nome, preco });
            atualizarInterfaceCarrinho();
            if(!document.getElementById('carrinho-lateral').classList.contains('ativo')) {
                toggleCarrinho();
            }
        }

        function atualizarInterfaceCarrinho() {
            const lista = document.getElementById('itens-carrinho');
            const totalSpan = document.getElementById('valor-total');
            let total = 0;
            
            lista.innerHTML = '';
            carrinho.forEach((item, index) => {
                total += item.preco;
                lista.innerHTML += `
                    <div class="item-carrinho">
                        <div>
                            <strong>${item.nome}</strong><br>
                            <small style="color: var(--cor-primaria)">R$ ${item.preco.toFixed(2)}</small>
                        </div>
                        <button onclick="removerItem(${index})" style="background:none; border:none; color:red; cursor:pointer;">&times;</button>
                    </div>`;
            });
            
            totalSpan.innerText = total.toFixed(2);
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            atualizarInterfaceCarrinho();
        }

        function enviarParaWhatsapp() {
            if (carrinho.length === 0) return alert("O carrinho está vazio!");

            let mensagem = "Oi Valéria! Escolhi essas peças no site:\n\n";
            carrinho.forEach(item => {
                mensagem += `- ${item.nome} (R$ ${item.preco.toFixed(2)})\n`;
            });
            
            const total = document.getElementById('valor-total').innerText;
            mensagem += `\n*Total: R$ ${total}*\n\nComo posso realizar o pagamento?`;

            const telefone = "55219XXXXXXXX"; // <-- TROQUE PELO ZAP DA VALÉRIA
            window.open(`https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`, '_blank');
        }
    </script>
</body>
</html>
